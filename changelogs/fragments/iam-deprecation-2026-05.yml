breaking_changes:
  - iam_role - removed the ``create_instance_profile`` parameter. The parameter was deprecated in release 7.0.0. Use the M(amazon.aws.iam_instance_profile) module to manage instance profiles (https://github.com/ansible-collections/amazon.aws/pull/2926).
  - iam_role - removed the ``delete_instance_profile`` parameter. The parameter was deprecated in release 7.0.0. Use the M(amazon.aws.iam_instance_profile) module to manage instance profiles (https://github.com/ansible-collections/amazon.aws/pull/2926).
  - iam_role - removed the ``assume_role_policy_document_raw`` return value. The return value was deprecated in release 8.0.0. Use ``assume_role_policy_document`` instead (https://github.com/ansible-collections/amazon.aws/pull/2926).
  - iam_role_info - removed the ``assume_role_policy_document_raw`` return value. The return value was deprecated in release 8.0.0. Use ``assume_role_policy_document`` instead (https://github.com/ansible-collections/amazon.aws/pull/2926).
  - iam_role_info - the ``path_prefix`` parameter now requires paths to begin and end with ``/``. Previously invalid paths were automatically corrected. This behaviour was deprecated in release 7.2.0 (https://github.com/ansible-collections/amazon.aws/pull/2926).
