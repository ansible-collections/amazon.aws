---
_resource_prefix: 'AnsibleTest-{{ tiny_prefix }}'
vpc_seed: "{{ _resource_prefix }}"
tgw_name: "{{ _resource_prefix }}"
tgw_name_2: "{{ _resource_prefix }}-2"
vpc_name_a: "{{ _resource_prefix }}-1"
vpc_name_b: "{{ _resource_prefix }}-2"
vpc_cidr_a: "10.{{ 256 | random(seed=vpc_seed) }}.52.0/24"
vpc_cidr_b: "10.{{ 256 | random(seed=vpc_seed) }}.53.0/24"

subnet_cidr_a_1: "{{ vpc_cidr_a | ansible.utils.ipsubnet(26, 0) }}"
subnet_cidr_a_2: "{{ vpc_cidr_a | ansible.utils.ipsubnet(26, 1) }}"
subnet_cidr_a_3: "{{ vpc_cidr_a | ansible.utils.ipsubnet(26, 2) }}"
subnet_cidr_a_1a: "{{ vpc_cidr_a | ansible.utils.ipsubnet(26, 3) }}"
subnet_cidr_b_1: "{{ vpc_cidr_b | ansible.utils.ipsubnet(26, 0) }}"
subnet_cidr_b_2: "{{ vpc_cidr_b | ansible.utils.ipsubnet(26, 1) }}"

subnet_name_a_1: "{{ _resource_prefix }}-a-1"
subnet_name_a_1a: "{{ _resource_prefix }}-a-1a"
subnet_name_a_2: "{{ _resource_prefix }}-a-2"
subnet_name_a_3: "{{ _resource_prefix }}-a-3"
subnet_name_b_1: "{{ _resource_prefix }}-b-1"
subnet_name_b_2: "{{ _resource_prefix }}-b-2"

attachment_name: "{{ _resource_prefix }}"
attachment_name_complex: "{{ _resource_prefix }}-complex"
