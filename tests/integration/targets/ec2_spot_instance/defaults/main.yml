---
vpc_seed_a: "{{ resource_prefix }}"
vpc_cidr: "10.{{ 256 | random(seed=vpc_seed_a) }}.48.0/22"
ip_1: "{{ vpc_cidr | ansible.utils.ipmath(4) | ansible.utils.ipaddr('address') }}"
ip_2: "{{ vpc_cidr | ansible.utils.ipmath(5) | ansible.utils.ipaddr('address') }}"
ip_3: "{{ vpc_cidr | ansible.utils.ipmath(6) | ansible.utils.ipaddr('address') }}"
ip_4: "{{ vpc_cidr | ansible.utils.ipmath(7) | ansible.utils.ipaddr('address') }}"
ip_5: "{{ vpc_cidr | ansible.utils.ipmath(8) | ansible.utils.ipaddr('address') }}"

ec2_ips:
  - "{{ vpc_cidr | ansible.utils.ipmath(9) | ansible.utils.ipaddr('address') }}"
  - "{{ vpc_cidr | ansible.utils.ipmath(10) | ansible.utils.ipaddr('address') }}"
