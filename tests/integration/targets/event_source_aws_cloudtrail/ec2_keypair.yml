---
# Beware: most of our tests here are run in parallel.
# To add new tests you'll need to add a new host to the inventory and a matching playbook.
- name: Create ec2 key for event source eda cloudtrail tests
  hosts: all
  gather_facts: false
  tasks:
    - module_defaults:
        group/aws:
          region: "{{ aws_region }}"
          access_key: "{{ aws_access_key }}"
          secret_key: "{{ aws_secret_key }}"
          session_token: "{{ security_token | default(omit) }}"
    
      block:

        # ============================================================
        # Pre-check: ansible-rulebook must be running
        # ============================================================
        - name: Check if ansible-rulebook is running
          ansible.builtin.command: pgrep -f ansible-rulebook
          register: ansible_rulebook_check
          ignore_errors: true
          changed_when: false

        - name: Assert ansible-rulebook process is running
          ansible.builtin.assert:
            that: ansible_rulebook_check.rc == 0
            fail_msg: "ansible-rulebook is not running; run it before running this playbook"

        # ============================================================
        # Test: create new key by AWS (key_material not provided)
        # ============================================================
        - name: Test creating a new key pair (check_mode)
          amazon.aws.ec2_key:
            name: "{{ ec2_key_name }}"
            state: present
            tags:
              snake_case: a_snake_case_value
              CamelCase: CamelCaseValue
              spaced key: Spaced value
          register: result
          check_mode: true

        - name: Assert creating a new key pair
          ansible.builtin.assert:
            that:
              - result is changed

        - name: Assert that key pair was not created
          amazon.aws.ec2_key_info:
            names:
              - "{{ ec2_key_name }}"
          register: aws_keypair
          failed_when: aws_keypair.keypairs | length > 0

        - name: Test creating a new key pair
          amazon.aws.ec2_key:
            name: "{{ ec2_key_name }}"
            state: present
            tags:
              snake_case: a_snake_case_value
              CamelCase: CamelCaseValue
              spaced key: Spaced value
          register: result

        - name: Assert creating a new key pair
          ansible.builtin.assert:
            that:
              - result is changed
              - result.key.name == ec2_key_name

        - name: Assert that key pair was created
          amazon.aws.ec2_key_info:
            names:
              - "{{ ec2_key_name }}"
          register: aws_keypair
          failed_when: aws_keypair.keypairs | length == 0
        
        # ============================================================
        # Test: Check event source removed the key
        # ============================================================
        - name: Check that key pair was removed by event source
          block:
            - name: Check that key pair was removed (retry up to 3 min)
              amazon.aws.ec2_key_info:
                names:
                  - "{{ ec2_key_name }}"
              register: keys
              until: keys.keypairs | length == 0
              retries: 36
              delay: 5
          rescue:
            - name: Fail with assertion message
              ansible.builtin.fail:
                msg: "Key pair '{{ ec2_key_name }}' was not removed after 3 minutes (event source may not have processed CreateKeyPair)"
        
        # ============================================================
        # Test: Check ansible-rulebook process was shutdown by event source
        # ============================================================
        - name: Check that ansible-rulebook proccess was shutdown by event source
          block:
            - name: Check that ansible-rulebook process was shutdown (retry up to 3 min)
              ansible.builtin.command: pgrep -f ansible-rulebook
              register: ansible_rulebook_check
              until: ansible_rulebook_check.rc != 0
              ignore_errors: true
              retries: 36
              delay: 5
            - name: Assert ansible-rulebook process was shutdown
              ansible.builtin.assert:
                that: ansible_rulebook_check.rc != 0
                fail_msg: "Ansible-rulebook process was not shutdown after 3 minutes (event source may not have processed DeleteKeyPair)"

      always:
        # ============================================================
        - name: Always delete the key we might create
          amazon.aws.ec2_key:
            name: "{{ ec2_key_name }}"
            state: absent
          ignore_errors: true

        # ============================================================
        - name: Always kill the ansible-rulebook process
          ansible.builtin.command: pkill -f ansible-rulebook
          ignore_errors: true
          changed_when: false
          run_once: true
