---
- name: Run tests related to key state (rotation, deletion and deletion cancellation)
  block:
    # ============================================================
    #   PREPARATION
    #
    # Get some information about who we are before starting our tests
    # we'll need this as soon as we start working on the policies
    - name: Get ARN of calling user
      amazon.aws.aws_caller_info:
      register: aws_caller_info
    - name: Get key info to verify it does not exist yet
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}"
    - name: Create a key - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}-check"
        tags:
          Hello: World
        state: present
        enabled: true
      register: key_check
      check_mode: true
    - name: Get key info for check mode key
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}-check"
      register: check_key
    - name: Assert that check mode worked as expected
      ansible.builtin.assert:
        that:
          - check_key.kms_keys | length == 0
          - key_check is changed

    - name: Create a key
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
        enable_key_rotation: false
      register: key
    - name: Assert that state is enabled
      ansible.builtin.assert:
        that:
          - key is changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == false
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''
          - key.multi_region == False

    - name: Wait for key creation to propagate
      ansible.builtin.include_tasks: double_check_key_state.yml
      loop: "{{ range(0, 10) | list }}"
      loop_control:
        pause: 10
        label: "Attempt {{ item + 1 }}/10"
        break_when:
          - state_check_a is defined
          - state_check_b is defined
          - state_check_a.kms_keys[0].key_state == "Enabled"
          - state_check_b.kms_keys[0].key_state == "Enabled"
    - name: Create a key (idempotence) - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
      register: key
      check_mode: true
    - name: Assert that no change is expected
      ansible.builtin.assert:
        that:
          - key is not changed

    - name: Create a key (idempotence)
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
      register: key
      check_mode: true
    - name: Assert that no change occurred
      ansible.builtin.assert:
        that:
          - key is not changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == false
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''
          - key.multi_region == False

    # ------------------------------------------------------------------------------------------

    - name: Save IDs for later
      ansible.builtin.set_fact:
        kms_key_id: "{{ key.key_id }}"
        kms_key_arn: "{{ key.key_arn }}"

    - name: Enable key rotation - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
        enable_key_rotation: true
      register: key
      check_mode: true
    - name: Assert that change is expected
      ansible.builtin.assert:
        that:
          - key.changed

    - name: Enable key rotation
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
        enable_key_rotation: true
      register: key
    - name: Assert that key rotation is enabled
      ansible.builtin.assert:
        that:
          - key is changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''

    - name: Wait for key rotation to propagate
      ansible.builtin.include_tasks: double_check_key_state.yml
      loop: "{{ range(0, 10) | list }}"
      loop_control:
        pause: 10
        label: "Attempt {{ item + 1 }}/10"
        break_when:
          - state_check_a is defined
          - state_check_b is defined
          - state_check_a.kms_keys[0].enable_key_rotation == true
          - state_check_b.kms_keys[0].enable_key_rotation == true
    - name: Enable key rotation (idempotence) - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
        enable_key_rotation: true
      register: key
      check_mode: true
    - name: Assert that no change is expected
      ansible.builtin.assert:
        that:
          - not key.changed

    - name: Enable key rotation (idempotence)
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        tags:
          Hello: World
        state: present
        enabled: true
        enable_key_rotation: true
      register: key
    - name: Assert that no change occurred
      ansible.builtin.assert:
        that:
          - not key is changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''

    # ------------------------------------------------------------------------------------------

    - name: Disable key - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
        enabled: false
      register: key
      check_mode: true
    - name: Assert that change is expected
      ansible.builtin.assert:
        that:
          - key.changed

    - name: Disable key
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
        enabled: false
      register: key
    - name: Assert that state is disabled
      ansible.builtin.assert:
        that:
          - key is changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Disabled"
          - key.enabled == False
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''

    - name: Wait for key disable to propagate
      ansible.builtin.include_tasks: double_check_key_state.yml
      loop: "{{ range(0, 10) | list }}"
      loop_control:
        pause: 10
        label: "Attempt {{ item + 1 }}/10"
        break_when:
          - state_check_a is defined
          - state_check_b is defined
          - state_check_a.kms_keys[0].key_state == "Disabled"
          - state_check_b.kms_keys[0].key_state == "Disabled"
    - name: Disable key (idempotence) - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
        enabled: false
      register: key
      check_mode: true
    - name: Assert that no change is expected
      ansible.builtin.assert:
        that:
          - not key.changed

    - name: Disable key (idempotence)
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
        enabled: false
      register: key
    - name: Assert that no change occurred
      ansible.builtin.assert:
        that:
          - not key.changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Disabled"
          - key.enabled == False
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''

    # ------------------------------------------------------------------------------------------

    - name: Schedule key deletion - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: absent
      register: key
      check_mode: true
    - name: Assert that change is expected
      ansible.builtin.assert:
        that:
          - key is changed

    - name: Schedule key deletion
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: absent
      register: key

    - name: Assert that key was scheduled for deletion
      ansible.builtin.assert:
        that:
          - key.changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == False
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''

    - name: Wait for key deletion to propagate
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}"
      register: key_info
      until:
        - key_info.kms_keys[0].key_state == "PendingDeletion"
      retries: 10
      delay: 10

    - name: Wait for propagation to settle
      ansible.builtin.wait_for:
        timeout: 10
    - name: Get key info
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}"
      register: key_info

    - name: Assert that state is pending deletion
      vars:
        key_data: "{{ key_info.kms_keys[0] }}"
        now_time: '{{ lookup("pipe", "date -u +%Y-%m-%d\ %H:%M:%S") }}'
        deletion_time: "{{ key_data.deletion_date[:19] }}"
      ansible.builtin.assert:
        that:
          - key_data.key_id | length >= 36
          - not key_data.key_id.startswith("arn:aws")
          - '"key_arn" in key_data'
          - key_data.key_arn.endswith(key.key_id)
          - key_data.key_arn.startswith("arn:aws")
          - key_data.key_state == "PendingDeletion"
          - key_data.enabled == False
          - key_data.tags | length == 1
          - key_data.tags['Hello'] == 'World'
          - key_data.enable_key_rotation == False
          - key_data.key_usage == 'ENCRYPT_DECRYPT'
          - key_data.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key_data.grants | length == 0
          - key_data.key_policies | length == 1
          - key_data.key_policies[0].Id == 'key-default-1'
          - key_data.description == ''
          # Times won't be perfect, allow a 24 hour window
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days <= 30
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days >= 29

    - name: Schedule key deletion (idempotence) - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: absent
      register: key
      check_mode: true
    - name: Assert that no change is expected
      ansible.builtin.assert:
        that:
          - not key.changed

    - name: Schedule key deletion (idempotence)
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: absent
      register: key
    - name: Assert that no change occurred
      vars:
        now_time: '{{ lookup("pipe", "date -u +%Y-%m-%d\ %H:%M:%S") }}'
        deletion_time: "{{ key.deletion_date[:19] }}"
      ansible.builtin.assert:
        that:
          - not key.changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "PendingDeletion"
          - key.enabled == False
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == False
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''
          # Times won't be perfect, allow a 24 hour window
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days <= 30
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days >= 29

    # ------------------------------------------------------------------------------------------

    - name: Cancel key deletion - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
      register: key
      check_mode: true
    - name: Assert that change is expected
      ansible.builtin.assert:
        that:
          - key.changed

    - name: Cancel key deletion
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
      register: key
    - name: Assert that deletion is cancelled
      ansible.builtin.assert:
        that:
          - key.changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''
          - "'deletion_date' not in key"

    - name: Wait for key deletion cancellation to propagate
      ansible.builtin.include_tasks: double_check_key_state.yml
      loop: "{{ range(0, 10) | list }}"
      loop_control:
        pause: 10
        label: "Attempt {{ item + 1 }}/10"
        break_when:
          - state_check_a is defined
          - state_check_b is defined
          - state_check_a.kms_keys[0].key_state == "Enabled"
          - "'deletion_date' not in state_check_a.kms_keys[0]"
          - state_check_b.kms_keys[0].key_state == "Enabled"
          - "'deletion_date' not in state_check_b.kms_keys[0]"
    - name: Cancel key deletion (idempotence) - check mode
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
      register: key
      check_mode: true
    - name: Assert that no change is expected
      ansible.builtin.assert:
        that:
          - not key.changed

    - name: Cancel key deletion (idempotence)
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: present
      register: key
    - name: Assert that no change occurred
      ansible.builtin.assert:
        that:
          - not key.changed
          - '"key_id" in key'
          - key.key_id | length >= 36
          - not key.key_id.startswith("arn:aws")
          - '"key_arn" in key'
          - key.key_arn.endswith(key.key_id)
          - key.key_arn.startswith("arn:aws")
          - key.key_state == "Enabled"
          - key.enabled == True
          - key.tags | length == 1
          - key.tags['Hello'] == 'World'
          - key.enable_key_rotation == True
          - key.key_usage == 'ENCRYPT_DECRYPT'
          - key.customer_master_key_spec == 'SYMMETRIC_DEFAULT'
          - key.grants | length == 0
          - key.key_policies | length == 1
          - key.key_policies[0].Id == 'key-default-1'
          - key.description == ''
          - "'deletion_date' not in key"

    # ------------------------------------------------------------------------------------------

    - name: Schedule key deletion with specific window
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}"
        state: absent
        pending_window: 7
      register: delete_kms

    - name: Wait for key deletion schedule to propagate
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}"
      register: key_info
      until:
        - key_info.kms_keys[0].key_state == "PendingDeletion"
      retries: 10
      delay: 10

    - name: Wait for propagation to settle
      ansible.builtin.wait_for:
        timeout: 10
    - name: Get key info
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}"
        pending_deletion: true
      register: deleted_kms

    - name: Assert that state is pending deletion
      vars:
        deleted_key: "{{ deleted_kms.kms_keys[0] }}"
        now_time: '{{ lookup("pipe", "date -u +%Y-%m-%d\ %H:%M:%S") }}'
        deletion_time: "{{ deleted_key.deletion_date[:19] }}"
      ansible.builtin.assert:
        that:
          - delete_kms.changed
          - deleted_key.key_state == "PendingDeletion"
          # Times won't be perfect, allow a 24 hour window
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days <= 7
          - (( deletion_time | to_datetime("%Y-%m-%dT%H:%M:%S") ) - ( now_time | to_datetime )).days >= 6

    # ============================================================
    # test different key usage and specs
    - name: Create key with different specs
      amazon.aws.kms_key:
        alias: "{{ kms_key_alias }}-diff-spec-usage"
        purge_grants: true
        key_spec: ECC_NIST_P256
        key_usage: SIGN_VERIFY
      register: create_diff_kms
    - name: Wait for new key creation to propagate
      amazon.aws.kms_key_info:
        alias: "{{ kms_key_alias }}-diff-spec-usage"
      register: key_info
      until:
        - key_info.kms_keys[0].customer_master_key_spec == 'ECC_NIST_P256'
        - key_info.kms_keys[0].key_usage == 'SIGN_VERIFY'
      retries: 10
      delay: 10
    - name: Wait for propagation to settle
      ansible.builtin.wait_for:
        timeout: 10
    - name: Assert that key has different specs
      ansible.builtin.assert:
        that:
          - '"key_id" in create_diff_kms'
          - create_diff_kms.key_id | length >= 36
          - not create_diff_kms.key_id.startswith("arn:aws")
          - '"key_arn" in create_diff_kms'
          - create_diff_kms.key_arn.endswith(create_diff_kms.key_id)
          - create_diff_kms.key_arn.startswith("arn:aws")
          - create_diff_kms.key_usage == 'SIGN_VERIFY'
          - create_diff_kms.customer_master_key_spec == 'ECC_NIST_P256'

  always:
    # ============================================================
    #   CLEAN-UP
    - name: Schedule key deletion for cleanup
      amazon.aws.kms_key:
        state: absent
        alias: "{{ item }}"
        pending_window: 7
      ignore_errors: true # noqa: ignore-errors
      loop:
        - "{{ kms_key_alias }}"
        - "{{ kms_key_alias }}-diff-spec-usage"
        - "{{ kms_key_alias }}-check"
