---
# Tests to verify iam_role doesn't manage instance profiles
# Instance profiles should be managed using iam_instance_profile module

- block:
    # Verify iam_role doesn't create instance profiles
    - name: Delete Instance Profile (cleanup)
      amazon.aws.iam_instance_profile:
        state: absent
        name: "{{ test_role }}"

    - name: Create IAM Role without creating instance profile
      amazon.aws.iam_role:
        name: "{{ test_role }}"
      register: iam_role

    - ansible.builtin.assert:
        that:
          - iam_role is changed
          - '"iam:CreateInstanceProfile" not in iam_role.resource_actions'

    - name: Verify instance profile was not created
      amazon.aws.iam_instance_profile_info:
        name: "{{ test_role }}"
      register: iam_instance_profile

    - ansible.builtin.assert:
        that:
          - iam_instance_profile.iam_instance_profiles | length == 0

    # Verify iam_role detaches from but doesn't delete instance profiles
    - name: Create Instance Profile and attach role
      amazon.aws.iam_instance_profile:
        name: "{{ test_role }}"
        role: "{{ test_role }}"
      register: iam_instance_profile

    - ansible.builtin.assert:
        that:
          - iam_instance_profile is changed

    - name: Delete IAM Role (should detach from instance profile but not delete it)
      amazon.aws.iam_role:
        state: absent
        name: "{{ test_role }}"
      register: iam_role

    - ansible.builtin.assert:
        that:
          - iam_role is changed
          - '"iam:RemoveRoleFromInstanceProfile" in iam_role.resource_actions'
          - '"iam:DeleteInstanceProfile" not in iam_role.resource_actions'

    - name: Verify instance profile still exists after role deletion
      amazon.aws.iam_instance_profile_info:
        name: "{{ test_role }}"
      register: iam_instance_profile

    - ansible.builtin.assert:
        that:
          - iam_instance_profile.iam_instance_profiles | length == 1
          - iam_instance_profile.iam_instance_profiles[0].roles | length == 0

  always:
    - name: Delete Instance Profile (cleanup)
      amazon.aws.iam_instance_profile:
        state: absent
        name: "{{ test_role }}"
      ignore_errors: true
