---
- name: Find collection root path
  ansible.builtin.set_fact:
    collection_root: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') | default(playbook_dir ~ '/../../..', true) }}/ansible_collections/amazon/aws"

- ansible.builtin.set_fact:
    event_qry_path: "{{ collection_root }}/extensions/audit/event_query.yml"

- name: Parse event node query
  event_query_parser:
    path: "{{ event_qry_path }}"
  register: _result

- name: Set variable for node queries
  ansible.builtin.set_fact:
    event_node_queries: "{{ _result.node_queries }}"
