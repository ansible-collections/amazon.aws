---
name: Collection Docs
concurrency:
  group: docs-push-${{ github.sha }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
      - stable-*
    tags:
      - "*"
  schedule:
    - cron: "0 12 * * *"

jobs:
  build-docs:
    permissions:
      contents: read
    name: Build Ansible Docs
    uses: ansible-community/github-docs-build/.github/workflows/_shared-docs-build-push.yml@ea28abedf20b2db685a934b54d9833b9da24fe37 # @main as of 2026-03-25
    with:
      init-lenient: false
      init-fail-on-error: true
      ansible-ref: devel
      intersphinx-links: |
        community_aws:https://ansible-collections.github.io/community.aws/branch/main/
        ansible_devel:https://docs.ansible.com/ansible-core/devel/

  publish-docs-gh-pages:
    # use to prevent running on forks
    if: github.repository == 'ansible-collections/amazon.aws'
    permissions:
      contents: write
      pages: write
      id-token: write
    needs: [build-docs]
    name: Publish Ansible Docs
    uses: ansible-community/github-docs-build/.github/workflows/_shared-docs-build-publish-gh-pages.yml@ea28abedf20b2db685a934b54d9833b9da24fe37 # @main as of 2026-03-25
    with:
      artifact-name: ${{ needs.build-docs.outputs.artifact-name }}
      publish-gh-pages-branch: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
