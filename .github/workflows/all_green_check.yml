---
name: all_green

concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

on: # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - stable-*
    tags:
      - "*"

jobs:
  linters:
    uses: ./.github/workflows/linters.yml # use the callable linters job to run tests
  sanity:
    uses: ./.github/workflows/sanity.yml # use the callable sanity job to run tests
  units:
    uses: ./.github/workflows/units.yml # use the callable units job to run tests
  coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    needs: [units]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          python -m pip install "https://github.com/ansible/ansible/archive/stable-2.20.tar.gz"

      - name: Build and install collection
        id: build
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          source_path: ${{ github.workspace }}
          install_python_dependencies: true
          ansible_version: stable-2.20

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit --showlocals --ansible-host-pattern localhost \
            --cov=plugins --cov-report=xml:coverage.xml
        working-directory: ${{ steps.build.outputs.collection_path }}

      - name: Rewrite coverage paths to be repo-relative
        run: |
          python3 -c "
          import os
          prefix = os.environ['COLLECTION_PATH'].rstrip('/') + '/'
          with open('coverage.xml', 'r') as f:
            content = f.read()
          content = content.replace(prefix, '')
          with open('coverage.xml', 'w') as f:
            f.write(content)
          "
        env:
          COLLECTION_PATH: ${{ steps.build.outputs.collection_path }}
        working-directory: ${{ steps.build.outputs.collection_path }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ steps.build.outputs.collection_path }}/coverage.xml
  all_green:
    if: ${{ always() }}
    needs:
      - linters
      - sanity
      - units
      - coverage
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert set([
          '${{ needs.linters.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.units.result }}',
          '${{ needs.coverage.result }}'
          ]) == {'success'}"
